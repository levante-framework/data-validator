# Deploy data-validator as a Cloud Run Job (push to main or dev).

name: Deploy Cloud Run Job

on:
  push:
    branches:
      - dev
      - main

env:
  GCP_PROJECT: hs-levante-data-validator
  GCP_REGION: us-central1
  JOB_NAME: data-validator

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2.1.2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_VALIDATOR }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCloud Project
        run: gcloud config set project ${{ env.GCP_PROJECT }}

      - name: Deploy Cloud Run Job
        run: |
          gcloud run jobs deploy ${{ env.JOB_NAME }} \
            --project ${{ env.GCP_PROJECT }} \
            --source . \
            --region ${{ env.GCP_REGION }} \
            --memory 32Gi \
            --cpu 8 \
            --task-timeout 86400s \
            --max-retries 0 \
            --command python \
            --args main.py \
            --quiet

      - name: Remove retired Cloud Function (gen2)
        run: |
          gcloud functions delete ${{ env.JOB_NAME }} \
            --project ${{ env.GCP_PROJECT }} \
            --gen2 \
            --region ${{ env.GCP_REGION }} \
            --quiet 2>/dev/null || true

      - name: Remove legacy batch job name
        run: |
          gcloud run jobs delete data-validator-batch \
            --project ${{ env.GCP_PROJECT }} \
            --region ${{ env.GCP_REGION }} \
            --quiet 2>/dev/null || true
