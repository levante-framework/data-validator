# Deploy data-validator as a Cloud Run Job (push to main or dev).

name: Deploy Cloud Run Job

on:
  push:
    branches:
      - dev
      - main

env:
  GCP_PROJECT: hs-levante-data-validator
  GCP_REGION: us-central1
  JOB_NAME: data-validator
  TRIGGER_SERVICE: data-validator-trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2.1.2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_VALIDATOR }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCloud Project
        run: gcloud config set project ${{ env.GCP_PROJECT }}

      - name: Deploy Cloud Run Job
        run: |
          gcloud run jobs deploy ${{ env.JOB_NAME }} \
            --project ${{ env.GCP_PROJECT }} \
            --source . \
            --region ${{ env.GCP_REGION }} \
            --memory 32Gi \
            --cpu 8 \
            --task-timeout 86400s \
            --max-retries 0 \
            --command python \
            --args main.py \
            --quiet

      - name: Deploy HTTP trigger service (clean JSON API)
        run: |
          gcloud run deploy ${{ env.TRIGGER_SERVICE }} \
            --project ${{ env.GCP_PROJECT }} \
            --source . \
            --region ${{ env.GCP_REGION }} \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60s \
            --max-instances 5 \
            --allow-unauthenticated \
            --command gunicorn \
            --args trigger_main:app,--bind,:8080,--workers,1,--threads,2 \
            --quiet
