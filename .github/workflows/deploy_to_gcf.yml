# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Deploy to Google Cloud Functions

on:
  push:
    branches:
      - dev
      - main

env:
  GCP_PROJECT: hs-levante-data-validator
  GCP_REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2.1.2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_VALIDATOR }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCloud Project
        run: gcloud config set project ${{ env.GCP_PROJECT }}

      - name: Deploy HTTP Cloud Function (daily cron / fire-and-forget)
        run: |
          gcloud functions deploy data-validator \
            --project ${{ env.GCP_PROJECT }} \
            --gen2 \
            --region ${{ env.GCP_REGION }} \
            --runtime python312 \
            --trigger-http \
            --memory=32GiB \
            --timeout 3600s \
            --no-cpu-throttling \
            --allow-unauthenticated \
            --entry-point data_validator

      - name: Deploy Cloud Run batch job (all-sites / long runs, up to 24h)
        run: |
          gcloud run jobs deploy data-validator-batch \
            --project ${{ env.GCP_PROJECT }} \
            --source . \
            --region ${{ env.GCP_REGION }} \
            --memory 32Gi \
            --cpu 8 \
            --task-timeout 86400s \
            --max-retries 0 \
            --command python \
            --args batch_main.py

